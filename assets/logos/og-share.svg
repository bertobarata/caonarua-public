<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6e22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2ea038;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative circle top-right -->
  <circle cx="1050" cy="80" r="180" fill="#ffffff" fill-opacity="0.05" />
  <circle cx="1080" cy="120" r="120" fill="#ffffff" fill-opacity="0.05" />

  <!-- Decorative circle bottom-left -->
  <circle cx="150" cy="560" r="160" fill="#ffffff" fill-opacity="0.05" />

  <!-- Orange accent bar -->
  <rect x="0" y="540" width="1200" height="90" fill="#e37734" fill-opacity="0.85" />

  <!-- Paw print icon (simplified) -->
  <g transform="translate(590, 115)" fill="#ffffff" fill-opacity="0.12">
    <ellipse cx="0" cy="0" rx="55" ry="70" />
    <ellipse cx="-80" cy="-45" rx="32" ry="40" />
    <ellipse cx="80" cy="-45" rx="32" ry="40" />
    <ellipse cx="-130" cy="10" rx="22" ry="30" />
    <ellipse cx="130" cy="10" rx="22" ry="30" />
  </g>

  <!-- Main title / brand -->
  <text x="600" y="265" font-family="Georgia, 'Times New Roman', serif" font-size="108" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="-2">Cão na Rua</text>

  <!-- Divider -->
  <rect x="400" y="295" width="400" height="3" fill="#e37734" rx="2" />

  <!-- Headline (descriptive) -->
  <text x="600" y="365" font-family="Arial, Helvetica, sans-serif" font-size="38" fill="#ffffff" fill-opacity="0.95" text-anchor="middle" letter-spacing="0">A creche canina que o teu cão merece</text>

  <!-- Location subtitle -->
  <text x="600" y="415" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#ffffff" fill-opacity="0.75" text-anchor="middle" letter-spacing="1">Passeios · Transporte · Maceira, Sintra</text>

  <!-- CTA — left side of orange bar -->
  <text x="340" y="597" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" fill-opacity="1" text-anchor="middle" letter-spacing="0.5">Reserva o teu lugar agora →</text>

  <!-- Divider in bar -->
  <rect x="660" y="555" width="2" height="50" fill="#ffffff" fill-opacity="0.4" />

  <!-- URL — right side of orange bar -->
  <text x="870" y="597" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#ffffff" fill-opacity="0.95" text-anchor="middle" letter-spacing="1">www.caonarua.pt</text>
</svg>
